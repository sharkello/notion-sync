name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build

      - name: Create release package
        run: npm run package

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: main.js

      - name: Generate styles attestation
        uses: actions/attest@v4
        with:
          subject-path: styles.css

      - name: Create GitHub Release and upload assets
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            main.js
            styles.css
            manifest.json
            versions.json
          tag: ${{ github.ref_name }}

# Note: GitHub artifact attestations are generated for main.js and styles.css
# via actions/attest so the release assets are covered by platform-supported provenance.
